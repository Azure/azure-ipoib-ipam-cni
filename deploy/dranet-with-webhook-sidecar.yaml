#
# Example DRANet DaemonSet with the azure-ipoib IPoIB webhook running as a
# sidecar container in the same Pod.
#
# This manifest is derived from the upstream DRANet install manifest
# (https://github.com/google/dranet/blob/main/install.yaml, Apache-2.0) and adds:
#
#   * a `webhook` sidecar container running the azure-ipoib Profile Provider,
#   * `--profile-provider=webhook` / `--webhook-url` args on the dranet
#     container so DRANet resolves IPoIB IPAM through the webhook,
#   * an emptyDir volume shared between the two containers for the webhook Unix
#     socket, and
#   * a read-only hostPath mount of the HyperV KVP pool file for the webhook.
#
# Because both containers live in the same Pod, the Unix socket is shared via an
# emptyDir volume rather than a hostPath directory.
#
# Adjust the dranet image tag and RBAC/namespace to match your DRANet release.
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: dranet
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
  - apiGroups:
      - "resource.k8s.io"
    resources:
      - resourceslices
    verbs:
      - list
      - watch
      - create
      - update
      - delete
  - apiGroups:
      - "resource.k8s.io"
    resources:
      - resourceclaims
      - deviceclasses
    verbs:
      - get
  - apiGroups:
      - "resource.k8s.io"
    resources:
      - resourceclaims/status
    verbs:
      - patch
      - update
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: dranet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dranet
subjects:
- kind: ServiceAccount
  name: dranet
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dranet
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dranet
  namespace: kube-system
  labels:
    tier: node
    app: dranet
    k8s-app: dranet
spec:
  selector:
    matchLabels:
      app: dranet
  template:
    metadata:
      labels:
        tier: node
        app: dranet
        k8s-app: dranet
    spec:
      hostNetwork: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      serviceAccountName: dranet
      hostPID: true
      initContainers:
      - name: enable-nri
        image: busybox:stable
        volumeMounts:
        - mountPath: /etc
          name: etc
        securityContext:
          privileged: true
        command:
        - /bin/sh
        - -c
        - |
          set -o errexit
          set -o pipefail
          set -o nounset
          set -x
          if grep -q "io.containerd.nri.v1.nri" /etc/containerd/config.toml
          then
             echo "containerd config contains NRI reference already; taking no action"
          else
             echo "containerd config does not mention NRI, thus enabling it";
             printf '%s\n' "[plugins.\"io.containerd.nri.v1.nri\"]" "  disable = false" "  disable_connections = false" "  plugin_config_path = \"/etc/nri/conf.d\"" "  plugin_path = \"/opt/nri/plugins\"" "  plugin_registration_timeout = \"5s\"" "  plugin_request_timeout = \"5s\"" "  socket_path = \"/var/run/nri/nri.sock\"" >> /etc/containerd/config.toml
             echo "restarting containerd"
             nsenter -t 1 -m -u -i -n -p -- systemctl restart containerd
          fi
      containers:
      - name: dranet
        args:
        - /dranet
        - --v=4
        - --hostname-override=$(NODE_NAME)
        # Resolve IPoIB IPAM through the azure-ipoib webhook sidecar.
        - --profile-provider=webhook
        - --webhook-url=unix:///var/run/dranet/webhook.sock
        image: ghcr.io/google/dranet:stable
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            cpu: "100m"
            memory: "50Mi"
        securityContext:
          privileged: true
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9177
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/plugins
        - name: plugin-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: nri-plugin
          mountPath: /var/run/nri
        - name: netns
          mountPath: /var/run/netns
          mountPropagation: HostToContainer
        - name: infiniband
          mountPath: /dev/infiniband
          mountPropagation: HostToContainer
        - name: bpf-programs
          mountPath: /sys/fs/bpf
          mountPropagation: HostToContainer
        # Shared socket directory for talking to the webhook sidecar.
        - name: webhook-socket
          mountPath: /var/run/dranet
      # azure-ipoib IPoIB Profile Provider webhook sidecar.
      - name: webhook
        image: ghcr.io/azure/azure-ipoib-ipam-cni-webhook:latest
        args:
        - /webhook
        - --bind-address=unix:///var/run/dranet/webhook.sock
        - --kvp-path=/var/lib/hyperv/.kvp_pool_0
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
        volumeMounts:
        - name: webhook-socket
          mountPath: /var/run/dranet
        - name: kvp
          mountPath: /var/lib/hyperv/.kvp_pool_0
          readOnly: true
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/plugins
      - name: plugin-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: nri-plugin
        hostPath:
          path: /var/run/nri
      - name: netns
        hostPath:
          path: /var/run/netns
      - name: infiniband
        hostPath:
          path: /dev/infiniband
      - name: etc
        hostPath:
          path: /etc
      - name: bpf-programs
        hostPath:
          path: /sys/fs/bpf
      # Shared between the dranet and webhook containers for the Unix socket.
      - name: webhook-socket
        emptyDir: {}
      - name: kvp
        hostPath:
          path: /var/lib/hyperv/.kvp_pool_0
          type: File
